<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama Proxy Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #e2e8f0;
      --bg-card: #ffffff;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #cbd5e1;
      --chart-grid: #e2e8f0;
      --chart-text: #64748b;
      --accent-transparent: rgba(37, 99, 235, 0.1);
      --shadow: rgba(0, 0, 0, 0.1);
      --gradient-start: #2563eb;
      --gradient-end: #1e40af;
    }
    [data-theme="dark"] {
      --bg-primary: #0f1419;
      --bg-secondary: #1a2332;
      --bg-card: #1e2a3a;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #2d3a4d;
      --chart-grid: #2d3a4d;
      --chart-text: #94a3b8;
      --accent-transparent: rgba(59, 130, 246, 0.1);
      --shadow: rgba(0, 0, 0, 0.3);
      --gradient-start: #3b82f6;
      --gradient-end: #1e40af;
    }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      line-height: 1.6; 
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    
    /* Login */
    .login-container { 
      max-width: 420px; 
      margin: 120px auto; 
      background: var(--bg-card);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px var(--shadow);
    }
    .login-container h2 { 
      font-size: 24px; 
      margin-bottom: 24px; 
      text-align: center;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { 
      display: block; 
      margin-bottom: 8px; 
      font-weight: 500; 
      color: var(--text-secondary);
      font-size: 14px;
    }
    .form-group input { 
      width: 100%; 
      padding: 14px 16px; 
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px; 
      font-size: 15px;
      color: var(--text-primary);
      transition: all 0.2s;
    }
    .form-group input:focus { 
      outline: none; 
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-transparent);
    }
    .btn { 
      padding: 14px 24px; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-size: 15px; 
      font-weight: 600; 
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary { 
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); 
      color: #fff;
    }
    .btn-primary:hover { 
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px var(--accent);
    }
    .login-hint {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .login-hint code {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* Header */
    header { 
      background: var(--bg-card); 
      padding: 20px 28px; 
      border-radius: 16px; 
      margin-bottom: 24px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      border: 1px solid var(--border);
    }
    header h1 { 
      font-size: 22px; 
      font-weight: 700;
    }
    header h1 span {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logout-btn { 
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    .theme-btn {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .theme-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Stats Grid */
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
      gap: 20px; 
      margin-bottom: 28px; 
    }
    .stat-card { 
      background: var(--bg-card); 
      padding: 24px; 
      border-radius: 16px; 
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px var(--shadow);
    }
    .stat-card h3 { 
      font-size: 13px; 
      color: var(--text-secondary); 
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card .value { 
      font-size: 36px; 
      font-weight: 700; 
      background: linear-gradient(135deg, #f1f5f9, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .trend {
      font-size: 12px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-card .trend.up { color: var(--success); }
    .stat-card .trend.down { color: var(--danger); }

    /* Sections */
    .section { 
      background: var(--bg-card); 
      padding: 24px; 
      border-radius: 16px; 
      margin-bottom: 24px; 
      border: 1px solid var(--border);
    }
    .section h2 { 
      font-size: 18px; 
      margin-bottom: 20px; 
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section h2::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, var(--gradient-start), var(--gradient-end));
      border-radius: 2px;
    }

    /* Grid layouts */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* Leaderboard */
    .leaderboard { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      max-height: 500px;
      overflow-y: auto;
    }
    .leaderboard::-webkit-scrollbar { width: 6px; }
    .leaderboard::-webkit-scrollbar-track { background: var(--bg-secondary); }
    .leaderboard::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .leaderboard-item { 
      display: flex; 
      align-items: center; 
      padding: 16px 20px; 
      background: var(--bg-secondary); 
      border-radius: 12px; 
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .leaderboard-item:hover {
      border-color: var(--accent);
      background: var(--accent-transparent);
    }
    .leaderboard-rank { 
      width: 36px; 
      height: 36px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: var(--accent); 
      color: #fff; 
      border-radius: 10px; 
      font-weight: 700; 
      font-size: 14px; 
      margin-right: 16px; 
      flex-shrink: 0;
    }
    .leaderboard-rank.gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .leaderboard-rank.silver { background: linear-gradient(135deg, #6b7280, #4b5563); }
    .leaderboard-rank.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); }
    .leaderboard-info { flex: 1; min-width: 0; }
    .leaderboard-key { 
      font-size: 14px; 
      color: var(--text-primary); 
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .leaderboard-requests { 
      font-size: 12px; 
      color: var(--text-secondary); 
      margin-top: 4px;
    }
    .leaderboard-models { 
      margin-top: 10px; 
      display: flex; 
      flex-wrap: wrap; 
      gap: 6px; 
    }
    .model-tag { 
      display: inline-block; 
      padding: 4px 10px; 
      background: var(--accent-transparent); 
      border: 1px solid var(--accent);
      border-radius: 6px; 
      font-size: 11px; 
      color: var(--accent);
    }

    /* Charts */
    .chart-container {
      position: relative;
      height: 250px;
      padding: 10px;
    }

    /* Alerts */
    .alert { 
      padding: 14px 18px; 
      border-radius: 10px; 
      margin-bottom: 20px; 
      font-size: 14px;
    }
    .alert-error { background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.3); }
    .alert-success { background: rgba(16, 185, 129, 0.1); color: #059669; border: 1px solid rgba(16, 185, 129, 0.3); }

    .hidden { display: none; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .section { animation: fadeIn 0.4s ease-out; }
    .stat-card { animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginSection" class="login-container">
      <h2>Admin Login</h2>
      <div id="loginAlert"></div>
      <div class="form-group">
        <label for="adminToken">Admin Token</label>
        <input type="password" id="adminToken" placeholder="Enter your admin token">
      </div>
      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <p class="login-hint">
        Token stored in <code>~/.ollama/admin-token</code>
      </p>
    </div>

    <div id="dashboardSection" class="hidden">
      <header>
        <h1><span>Ollama</span> Proxy Dashboard</h1>
        <div style="display: flex; gap: 12px; align-items: center;">
          <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Requests</h3>
          <div class="value" id="totalRequests">0</div>
        </div>
        <div class="stat-card">
          <h3>Active Users</h3>
          <div class="value" id="activeUsers">0</div>
        </div>
        <div class="stat-card">
          <h3>Backend Keys</h3>
          <div class="value" id="totalKeys">0</div>
        </div>
        <div class="stat-card">
          <h3>Enabled Keys</h3>
          <div class="value" id="enabledKeys">0</div>
        </div>
        <div class="stat-card">
          <h3>Input Tokens</h3>
          <div class="value" id="totalInputTokens">0</div>
        </div>
        <div class="stat-card">
          <h3>Output Tokens</h3>
          <div class="value" id="totalOutputTokens">0</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="section">
          <h2>Daily Requests</h2>
          <div class="chart-container">
            <canvas id="dailyChart"></canvas>
          </div>
        </div>
        <div class="section">
          <h2>Hourly Requests</h2>
          <div class="chart-container">
            <canvas id="hourlyChart"></canvas>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Model Rankings</h2>
        <div class="leaderboard" id="modelRankings"></div>
      </div>

      <div class="section">
        <h2>User Leaderboard</h2>
        <div class="leaderboard" id="leaderboard"></div>
      </div>

      <div class="section">
        <h2>Recent Requests</h2>
        <div class="leaderboard" id="auditLogs"></div>
      </div>
    </div>
  </div>

  <script>
    let currentToken = null;
    let dailyChart, hourlyChart;

    let isDark = false;

    function getChartColors() {
      return {
        primary: isDark ? '#3b82f6' : '#2563eb',
        primaryTransparent: isDark ? 'rgba(59, 130, 246, 0.1)' : 'rgba(37, 99, 235, 0.1)',
        success: '#10b981',
        text: isDark ? '#94a3b8' : '#64748b',
        grid: isDark ? '#2d3a4d' : '#e2e8f0'
      };
    }

    function getComputedStyleValue(varName) {
      return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
      updateChartColors();
    }

    function updateChartColors() {
      const colors = getChartColors();
      dailyChart.data.datasets[0].borderColor = colors.primary;
      dailyChart.data.datasets[0].backgroundColor = colors.primaryTransparent;
      hourlyChart.data.datasets[0].borderColor = colors.success;
      hourlyChart.data.datasets[0].backgroundColor = 'rgba(16, 185, 129, 0.1)';
      
      [dailyChart, hourlyChart].forEach(chart => {
        chart.options.scales.x.ticks.color = colors.text;
        chart.options.scales.x.grid.color = colors.grid;
        chart.options.scales.y.ticks.color = colors.text;
        chart.options.scales.y.grid.color = colors.grid;
      });
      
      dailyChart.update();
      hourlyChart.update();
    }

    function initCharts() {
      const colors = getChartColors();
      const chartOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            grid: { color: colors.grid },
            ticks: { color: colors.text }
          },
          y: {
            grid: { color: colors.grid },
            ticks: { color: colors.text }
          }
        }
      };

      dailyChart = new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: colors.primary, backgroundColor: colors.primaryTransparent, fill: true, tension: 0.4 }] },
        options: chartOptions
      });

      hourlyChart = new Chart(document.getElementById('hourlyChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 }] },
        options: chartOptions
      });
    }

    async function login() {
      const token = document.getElementById('adminToken').value;
      if (!token) { showLoginAlert('Please enter a token', 'error'); return; }
      try {
        const response = await fetch('/api/token', { headers: { 'Authorization': `Bearer ${token}` } });
        if (response.ok) {
          currentToken = token;
          localStorage.setItem('adminToken', token);
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('dashboardSection').classList.remove('hidden');
          initCharts();
          loadDashboard();
        } else { showLoginAlert('Invalid token', 'error'); }
      } catch (err) { showLoginAlert('Login failed: ' + err.message, 'error'); }
    }

    function logout() {
      currentToken = null;
      localStorage.removeItem('adminToken');
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('dashboardSection').classList.add('hidden');
    }

    function showLoginAlert(message, type) {
      const alert = document.getElementById('loginAlert');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
    }

    async function loadDashboard() {
      await loadStats();
      await loadUserUsage();
      await loadUsage();
      await loadModelRankings();
      await loadAuditLogs();
      setTimeout(loadDashboard, 30000);
    }

    async function loadStats() {
      try {
        const response = await fetch('/api/stats', { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await response.json();
        document.getElementById('totalKeys').textContent = data.totalKeys;
        document.getElementById('enabledKeys').textContent = data.enabledKeys;
        document.getElementById('totalRequests').textContent = data.totalRequests.toLocaleString();
      } catch (err) { console.error('Failed to load stats:', err); }
      
      try {
        const response = await fetch('/api/models/ranked', { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await response.json();
        let totalInput = 0, totalOutput = 0;
        data.models.forEach(m => {
          totalInput += m.totalInputTokens || 0;
          totalOutput += m.totalOutputTokens || 0;
        });
        document.getElementById('totalInputTokens').textContent = totalInput.toLocaleString();
        document.getElementById('totalOutputTokens').textContent = totalOutput.toLocaleString();
      } catch (err) { console.error('Failed to load model stats:', err); }
    }

    async function loadUserUsage() {
      try {
        const response = await fetch('/api/user-usage', { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await response.json();
        renderLeaderboard(data.users);
        document.getElementById('activeUsers').textContent = data.users.length;
        let totalUserRequests = 0;
        data.users.forEach(u => totalUserRequests += u.requestCount);
        document.getElementById('totalRequests').textContent = totalUserRequests.toLocaleString();
      } catch (err) { console.error('Failed to load user usage:', err); }
    }

    function maskApiKey(key) {
      if (!key || key.length < 8) return '****';
      return key.slice(0, 4) + '****' + key.slice(-4);
    }

    function renderLeaderboard(users) {
      const container = document.getElementById('leaderboard');
      if (users.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary);">No requests yet</p>';
        return;
      }
      container.innerHTML = users.slice(0, 15).map((user, index) => {
        const rank = index + 1;
        let rankClass = '';
        if (rank === 1) rankClass = 'gold';
        else if (rank === 2) rankClass = 'silver';
        else if (rank === 3) rankClass = 'bronze';
        
        const modelTags = Object.entries(user.models)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5)
          .map(([model, count]) => `<span class="model-tag">${escapeHtml(model)} (${count})</span>`)
          .join('');
        
        return `
          <div class="leaderboard-item">
            <div class="leaderboard-rank ${rankClass}">${rank}</div>
            <div class="leaderboard-info">
              <div class="leaderboard-key">${maskApiKey(user.apiKey)}</div>
              <div class="leaderboard-requests">${user.requestCount.toLocaleString()} requests</div>
              <div class="leaderboard-models">${modelTags}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadModelRankings() {
      try {
        const response = await fetch('/api/models/ranked', { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await response.json();
        renderModelRankings(data.models);
      } catch (err) { console.error('Failed to load model rankings:', err); }
    }

    function renderModelRankings(models) {
      const container = document.getElementById('modelRankings');
      if (!models || models.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary);">No model data yet</p>';
        return;
      }
      container.innerHTML = models.slice(0, 15).map((m, index) => {
        const rank = index + 1;
        let rankClass = '';
        if (rank === 1) rankClass = 'gold';
        else if (rank === 2) rankClass = 'silver';
        else if (rank === 3) rankClass = 'bronze';
        const successRate = m.totalRequests > 0 
          ? Math.round((m.successCount / m.totalRequests) * 100) 
          : 0;
        const avgTime = m.successCount > 0 ? Math.round(m.totalResponseTime / m.successCount / 1000) : 0;
        const tokensPerSec = m.totalResponseTime > 0 ? Math.round((m.totalOutputTokens / m.totalResponseTime) * 1000) : 0;
        
        return `
          <div class="leaderboard-item">
            <div class="leaderboard-rank ${rankClass}">${rank}</div>
            <div class="leaderboard-info">
              <div class="leaderboard-key">${escapeHtml(m.model)}</div>
              <div class="leaderboard-requests">Score: ${m.score.toFixed(2)} | ${successRate}% success | ${avgTime}s avg | ${tokensPerSec} tok/s</div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadUsage() {
      try {
        const response = await fetch('/api/usage', { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await response.json();
        updateChart(dailyChart, data.daily);
        updateChart(hourlyChart, data.hourly);
      } catch (err) { console.error('Failed to load usage:', err); }
    }

    function updateChart(chart, data) {
      const entries = Object.entries(data);
      const labels = entries.map(([k]) => k.includes('T') ? k.split('T')[1]?.slice(0,5) : k.slice(-5));
      const values = entries.map(([, v]) => v);
      chart.data.labels = labels;
      chart.data.datasets[0].data = values;
      chart.update();
    }

    async function loadAuditLogs() {
      try {
        const response = await fetch('/api/audit-logs', { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await response.json();
        renderAuditLogs(data.logs);
      } catch (err) { console.error('Failed to load audit logs:', err); }
    }

    function renderAuditLogs(logs) {
      const container = document.getElementById('auditLogs');
      if (!logs || logs.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary);">No audit logs yet</p>';
        return;
      }
      container.innerHTML = logs.slice(0, 15).map(log => `
        <div class="leaderboard-item">
          <div class="leaderboard-info">
            <div class="leaderboard-key">${escapeHtml(log.model)}</div>
            <div class="leaderboard-requests">
              ${parseInt(log.input_tokens || 0).toLocaleString()} in / 
              ${parseInt(log.output_tokens || 0).toLocaleString()} out | 
              ${log.response_time_ms}ms | 
              ${new Date(log.timestamp).toLocaleString()}
            </div>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const savedToken = localStorage.getItem('adminToken');
      if (savedToken) {
        document.getElementById('adminToken').value = savedToken;
      }
      const savedTheme = localStorage.getItem('theme') || 'light';
      isDark = savedTheme === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
